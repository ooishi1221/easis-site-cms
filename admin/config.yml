# backend.repo は GitHub push 後に実際のリポジトリ名へ書き換えてください
backend:
  name: github
  repo: <GitHubユーザー名>/<リポジトリ名>
  branch: main
media_folder: content/uploads
public_folder: /uploads
collections:
  - name: post
    label: post
    folder: content/post
    create: true
    slug: '{{slug}}'
    fields:
      - label: タイトル
        name: title
        widget: string
      - label: スラッグ
        name: slug
        widget: string
      - label: URL
        name: url
        widget: string
        required: false
      - label: 種別
        name: type
        widget: hidden
        default: post
      - label: 日付
        name: date
        widget: datetime
        required: false
      - label: 本文
        name: body
        widget: markdown
  - name: page
    label: page
    folder: content/page
    create: true
    slug: '{{slug}}'
    fields:
      - label: タイトル
        name: title
        widget: string
      - label: スラッグ
        name: slug
        widget: string
      - label: URL
        name: url
        widget: string
        required: false
      - label: 種別
        name: type
        widget: hidden
        default: page
      - label: 日付
        name: date
        widget: datetime
        required: false
      - label: 本文
        name: body
        widget: markdown
  - name: category
    label: category
    folder: content/category
    create: true
    slug: '{{slug}}'
    fields:
      - label: タイトル
        name: title
        widget: string
      - label: スラッグ
        name: slug
        widget: string
      - label: URL
        name: url
        widget: string
        required: false
      - label: 種別
        name: type
        widget: hidden
        default: category
      - label: 日付
        name: date
        widget: datetime
        required: false
      - label: 本文
        name: body
        widget: markdown
